name: Build & Package

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-svg
            mingw-w64-x86_64-qt5-imageformats
            mingw-w64-x86_64-nsis
            zip

      - name: Build
        run: |
          set -euo pipefail
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON
          cmake --build build --config Release

      - name: Test
        run: |
          set -euo pipefail
          cd build
          ctest --output-on-failure

      - name: Extract version
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep -oP 'project\(SimplePicture VERSION \K[0-9.]+' CMakeLists.txt)
          fi
          if [[ -z "$VERSION" ]]; then
            echo "::error::Failed to extract version"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version: $VERSION"

      - name: Collect dist files
        run: |
          set -euo pipefail
          rm -rf installer/dist
          mkdir -p installer/dist/platforms installer/dist/imageformats

          cp build/SimplePicture.exe installer/dist/

          # Collect MinGW runtime DLLs
          while IFS= read -r dll; do
            cp "$dll" installer/dist/
          done < <(ldd build/SimplePicture.exe | grep -i mingw64 | awk '{print $3}')

          # Qt platform plugin
          QT_PLUGIN_DIR=$(qmake -query QT_INSTALL_PLUGINS 2>/dev/null || echo "/mingw64/share/qt5/plugins")
          cp "$QT_PLUGIN_DIR/platforms/qwindows.dll" installer/dist/platforms/

          # Qt imageformat plugins
          for fmt in qgif qico qjpeg qsvg qwebp qtiff; do
            [ -f "$QT_PLUGIN_DIR/imageformats/${fmt}.dll" ] && cp "$QT_PLUGIN_DIR/imageformats/${fmt}.dll" installer/dist/imageformats/
          done

          # Collect indirect dependencies of all DLLs (including plugins)
          # Loop until fixpoint to handle transitive dependencies
          while :; do
            added=0
            while IFS= read -r target; do
              while IFS= read -r dll; do
                [ -n "$dll" ] || continue
                name=$(basename "$dll")
                if [ ! -f "installer/dist/$name" ]; then
                  cp "$dll" "installer/dist/"
                  added=1
                fi
              done < <(ldd "$target" 2>/dev/null | grep -i mingw64 | awk '{print $3}' || true)
            done < <(find installer/dist -name "*.dll")
            [ "$added" -eq 0 ] && break
          done

          echo "Collected $(find installer/dist -type f | wc -l) files"

          # Verify no missing dependencies
          missing_found=0
          while IFS= read -r target; do
            missing=$(ldd "$target" 2>/dev/null | grep "not found" || true)
            if [ -n "$missing" ]; then
              echo "  $(basename "$target"):"
              echo "$missing"
              missing_found=1
            fi
          done < <(find installer/dist -type f \( -name "*.dll" -o -name "*.exe" \))
          if [ "$missing_found" -ne 0 ]; then
            echo "ERROR: Missing dependencies detected"
            exit 1
          fi
          echo "All dependencies satisfied."

      - name: Build NSIS installer
        run: |
          set -euo pipefail
          cd installer
          sed -i "s/!define APP_VERSION \".*\"/!define APP_VERSION \"$VERSION\"/" SimplePicture.nsi
          makensis SimplePicture.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SimplePicture-${{ env.VERSION }}-Setup.zip
          path: installer/SimplePicture-*-Setup.exe

      - name: Create portable zip
        run: |
          cd installer/dist
          zip -r "../SimplePicture-${VERSION}-Portable.zip" .

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: SimplePicture-${{ env.VERSION }}-Windows-Portable.zip
          path: installer/SimplePicture-*-Portable.zip

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake qtbase5-dev libqt5svg5-dev dpkg-dev debhelper

      - name: Extract version
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep -oP 'project\(SimplePicture VERSION \K[0-9.]+' CMakeLists.txt)
          fi
          if [[ -z "$VERSION" ]]; then
            echo "::error::Failed to extract version"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version: $VERSION"

      - name: Build deb package
        run: |
          dpkg-buildpackage -us -uc -b
          cp ../simplepicture_*_amd64.deb .

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: simplepicture_${{ env.VERSION }}-1_amd64.zip
          path: simplepicture_*_amd64.deb

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*-Setup.exe
            artifacts/**/*-Portable.zip
            artifacts/**/*.deb
          generate_release_notes: true
